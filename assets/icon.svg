    <!-- neck -->
    <path d="M37 30 L51 23"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round">
    <!-- beak -->
    <path d="M54 23 L59 22"/>
    <!-- trailing legs -->
    <path d="M25 37 L15 46"/>
    <path d="M28 38 L19 47"/>
